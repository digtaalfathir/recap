<!DOCTYPE html>
<html>
<head>
  <title>Dashboard Arsip</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f8f5f0;
    }

    header {
      background: #6f5e53;
      color: white;
      padding: 15px 30px;
      font-size: 20px;
      font-weight: bold;
    }

    .container {
      padding: 20px;
    }

    .topbar {
      margin-bottom: 20px;
    }

    select {
      padding: 8px;
      border-radius: 6px;
    }

    .cards {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
    }

    .card {
      flex: 1;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .card h3 {
      margin: 0;
      font-size: 14px;
      color: #888;
    }

    .card p {
      font-size: 24px;
      margin: 10px 0 0;
      font-weight: bold;
    }

    .chart-container {
      background: white;
      padding: 20px;
      border-radius: 10px;
      height: 350px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      margin-top: 20px;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #ddd;
    }

    th {
      background: #6f5e53;
      color: white;
    }

    button {
      margin-top: 20px;
      padding: 10px 15px;
      border-radius: 6px;
      border: none;
      background: #c8a97e;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #b8966d;
    }
  </style>
</head>

<body>

<header>Dashboard Arsip</header>

<div class="container">

  <!-- DROPDOWN -->
  <div class="topbar">
    <select id="sheetSelector" onchange="loadData()">
      <option value="GLOBAL">GLOBAL</option>
      <option value="TPP">UNDANGAN SIDANG TPP</option>
    </select>
  </div>

  <!-- CARD -->
  <div class="cards">
    <div class="card">
      <h3>Total Data</h3>
      <p id="total">0</p>
    </div>
    <div class="card">
      <h3>Total Tahun</h3>
      <p id="tahunCount">0</p>
    </div>
  </div>

  <!-- CHART -->
  <div class="chart-container">
    <canvas id="myChart"></canvas>
  </div>

  <button onclick="toggleTable()">Toggle Table</button>

  <table id="dataTable" style="display:none;">
    <thead>
      <tr id="tableHead"></tr>
    </thead>
    <tbody></tbody>
  </table>

</div>

<script>
const SPREADSHEET_ID = "1nxImhgxczvgjaClI6DOLpSKsVFZleKWe";

const CONFIG = {
  GLOBAL: {
    gid: "187873921",
    columns: {
      no: 0,
      jenis: 1,
      uraian: 2,
      tahun: 4,
      jumlah: 5
    },
    headers: ["No", "Jenis Arsip", "Uraian", "Tahun", "Jumlah"],
    hasJumlah: true
  },

  TPP: {
    gid: "1891241188",
    columns: {
      no: 0,
      nomor: 1,
      perihal: 2,
      asal: 3,
      tahun: 4
    },
    headers: ["No", "Nomor Laporan", "Perihal", "Asal", "Tahun"],
    hasJumlah: false
  }
};

let chart;
let renderTable = false;

async function loadData() {

  const selected = document.getElementById("sheetSelector").value;
  const cfg = CONFIG[selected];

  const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json&gid=${cfg.gid}`;

  const res = await fetch(url);
  const text = await res.text();
  const json = JSON.parse(text.substring(47).slice(0, -2));
  const rows = json.table.rows;

  const yearMap = {};
  let total = 0;

  const tbody = document.querySelector("#dataTable tbody");
  const thead = document.getElementById("tableHead");

  tbody.innerHTML = "";
  thead.innerHTML = "";
  let html = "";

  cfg.headers.forEach(h => {
    thead.innerHTML += `<th>${h}</th>`;
  });

  rows.forEach(r => {

    if (!r.c) return;

    let no = r.c[cfg.columns.no]?.v;
    let tahun = r.c[cfg.columns.tahun]?.v;
    let rawJumlah = r.c[cfg.columns.jumlah]?.v;

    if (!no || !tahun) return;

    let jumlah = cfg.hasJumlah
      ? Number(rawJumlah || 0)
      : 1;

    if (!isNaN(jumlah) && jumlah > 0) {
      total += jumlah;
    }

    if (!isNaN(jumlah)) {
      yearMap[tahun] = (yearMap[tahun] || 0) + jumlah;
    }

    let tr = "<tr>";

    if (selected === "GLOBAL") {
      tr += `
        <td>${no || ""}</td>
        <td>${r.c[cfg.columns.jenis]?.v || ""}</td>
        <td>${r.c[cfg.columns.uraian]?.v || ""}</td>
        <td>${tahun || ""}</td>
        <td>${jumlah || ""}</td>
      `;
    } else {
      tr += `
        <td>${no || ""}</td>
        <td>${r.c[cfg.columns.nomor]?.v || ""}</td>
        <td>${r.c[cfg.columns.perihal]?.v || ""}</td>
        <td>${r.c[cfg.columns.asal]?.v || ""}</td>
        <td>${tahun || ""}</td>
      `;
    }

    tr += "</tr>";
    html += tr;
  });

  if (renderTable) {
    tbody.innerHTML = html;
  }

  const labels = Object.keys(yearMap).sort();
  const data = labels.map(y => yearMap[y]);

  document.getElementById("total").innerText = total;
  document.getElementById("tahunCount").innerText = labels.length;

  if (chart) chart.destroy();

  chart = new Chart(document.getElementById("myChart"), {
    type: "bar",
    data: {
      labels,
      datasets: [{
        label: selected,
        data,
        backgroundColor: "#c8a97e",
        borderRadius: 6
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false
    }
  });
}

function toggleTable() {
  renderTable = !renderTable;

  const table = document.getElementById("dataTable");

  if (renderTable) {
    table.style.display = "table";
  } else {
    table.style.display = "none";
  }

  loadData(); 
}

loadData();

setInterval(() => {
  loadData();
}, 15000); // 30 detik
</script>

</body>
</html>
